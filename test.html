<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Dump</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    button { padding: 8px 14px; margin-bottom: 12px; }
    table { border-collapse: collapse; margin-bottom: 24px; width: 100%; max-width: 100%; }







th, td { border: 1px solid #888; padding: 8px; }
    th { background: #eee; }
    pre { background: #f5f5f5; border: 1px solid #ccc; padding: 12px; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <h1>Database Dump</h1>
  <button id="refreshBtn">Refresh data</button>
  <div id="db">Loading database...</div>
  <h2>Raw JSON response</h2>
  <pre id="rawJson"></pre>

  <script>
    const apiUrl = "/database";
    const dbDiv = document.getElementById("db");
    const rawJson = document.getElementById("rawJson");
    const refreshBtn = document.getElementById("refreshBtn");

    function renderDatabase(data) {
      dbDiv.innerHTML = "";

      for (const [table, content] of Object.entries(data)) {
        const h2 = document.createElement("h2");
        h2.textContent = table;
        dbDiv.appendChild(h2);

        if (!content.rows || content.rows.length === 0) {
          const p = document.createElement("p");
          p.textContent = "(no rows)";
          dbDiv.appendChild(p);
          continue;
        }

        const tableEl = document.createElement("table");
        const headerRow = document.createElement("tr");
        content.columns.forEach(col => {
          const th = document.createElement("th");
          th.textContent = col;
          headerRow.appendChild(th);
        });
        tableEl.appendChild(headerRow);

        content.rows.forEach(row => {
          const tr = document.createElement("tr");
          row.forEach(cell => {
            const td = document.createElement("td");
            td.textContent = cell;
            tr.appendChild(td);
          });
          tableEl.appendChild(tr);
        });

        dbDiv.appendChild(tableEl);
      }
    }

    async function loadDatabase() {
      try {
        dbDiv.textContent = "Loading database...";
        rawJson.textContent = "";

        const response = await fetch(apiUrl);
        const data = await response.json();

        rawJson.textContent = JSON.stringify(data, null, 2);
        renderDatabase(data);
      } catch (err) {
        dbDiv.textContent = "Error loading database.";
        rawJson.textContent = err.toString();
        console.error("Error fetching database:", err);
      }
    }

    refreshBtn.addEventListener("click", loadDatabase);
    loadDatabase();
  </script>
</body>
</html>
